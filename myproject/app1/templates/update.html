<!DOCTYPE html>
<html>
<head>
    <title>Update Student</title>
</head>
<body>

<h1>Update Student</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="name" value="{{ student.name }}" required>
    <input type="number" name="age" value="{{ student.age }}" required>
    <button type="submit">Update</button>
</form>

<br>
<a href="/">Back</a>

</body>
</html>
